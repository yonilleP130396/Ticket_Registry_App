<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGENT PORTAL | RAFFLE ACCESS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f0f1e 100%);
            font-family: 'Courier Prime', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }

        .glass {
            background: rgba(15, 15, 30, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(212, 175, 55, 0.3);
        }

        h1 { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; }

        .input-field {
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            box-shadow: 0 0 10px #d4af37;
            border-color: #ffd700;
        }

        .cta-btn {
            background: linear-gradient(to right, #d4af37, #ffd700);
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            color: #0a0e27;
            transition: all 0.4s ease;
        }

        .cta-btn:hover {
            box-shadow: 0 0 15px #ffd700;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="glass p-8 rounded-lg w-full max-w-md shadow-2xl animate-in fade-in zoom-in duration-500">
        <h1 class="text-2xl text-center text-[#d4af37] mb-8">AUTHENTICATION</h1>
        
        <div th:if="${param.error}" 
             class="mb-4 p-3 bg-red-900/50 border border-[#d9534f] text-[#d9534f] text-center text-sm font-bold uppercase tracking-widest animate-pulse">
            AUTHORIZATION DENIED: INVALID CREDENTIALS
        </div>

        <div th:if="${param.logout}" 
             class="mb-4 p-3 bg-green-900/50 border border-green-600 text-green-400 text-center text-sm font-bold uppercase tracking-widest">
            SESSION TERMINATED: ACCESS CLEARED
        </div>
        
        <form th:action="@{/login}" method="post" class="space-y-6">
            <div>
                <label class="block text-xs text-[#ffd700] mb-2 uppercase">Agent ID / Username</label>
                <input type="text" name="username" required class="input-field w-full p-3 text-white rounded outline-none">
            </div>
            
            <div>
                <label class="block text-xs text-[#ffd700] mb-2 uppercase">Encryption Key</label>
                <input type="password" name="password" required class="input-field w-full p-3 text-white rounded outline-none">
            </div>

            <button type="submit" class="cta-btn w-full p-4 rounded uppercase">
                Initialize Entry
            </button>
        </form>
    </div>

</body>
</html>
