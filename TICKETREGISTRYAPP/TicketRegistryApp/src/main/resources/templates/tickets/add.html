<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGENT PORTAL | ASSET REGISTRY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f0f1e 100%);
            font-family: 'Courier Prime', monospace;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .glass {
            background: rgba(15, 15, 30, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(212, 175, 55, 0.3);
        }
        h1, h2 { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; }
        .input-field {
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid rgba(212, 175, 55, 0.4);
        }
        .input-field:focus { border-color: #d4af37; box-shadow: 0 0 10px #d4af37; outline: none; }
        .cta-btn {
            background: linear-gradient(to right, #d4af37, #ffd700);
            letter-spacing: 2px;
            color: #0a0e27;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
        }
    </style>
    <style>
    .nav-link { color: #d4af37; transition: 0.3s; font-family: 'Orbitron', sans-serif; }
    .nav-link:hover { color: #ffd700; text-shadow: 0 0 8px #ffd700; }
</style>
</head>
<body class="p-6">

    <div class="rounded-lg max-w-10xl mx-auto">
        <nav class="glass mb-8 p-4 rounded-lg flex justify-between items-center w-full border-b-2 border-[rgba(212,175,55,0.3)]">
            <h1 class="text-sm tracking-widest text-[#d4af37] font-bold uppercase">Personnel Ticket Registry</h1>
            
            <div class="flex gap-8 uppercase text-xs items-center">
                <a th:href="@{/admin}" class="nav-link">Home</a>
                <a th:href="@{/admin/new}" class="nav-link">Registry</a>

                <form th:action="@{/logout}" method="post" class="m-0 p-0 inline-block">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" 
                            class="nav-link text-[#d9534f] hover:text-red-500 uppercase tracking-widest cursor-pointer bg-transparent border-0 p-0 m-0 font-['Orbitron',sans-serif]">
                        Terminate Session
                    </button>
                </form>
            </div> 
        </nav>
    </div>
    
    <div class="glass p-8 rounded-lg max-w-6xl mx-auto">
        <div th:if="${param.success}" class="mb-6 p-4 bg-green-900/30 border border-green-500/50 text-green-400 text-center rounded animate-pulse font-['Orbitron'] uppercase tracking-widest text-xs">
            [ SYSTEM NOTIFICATION: TICKET ENROLLMENT SUCCESSFUL ]
        </div>
        <h2 class="text-xl text-[#d4af37] mb-8 text-center">ENROLL NEW TICKET</h2>
        <form th:action="@{/admin/save}" method="post" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <input type="hidden" name="ticketId" class="input-field w-full p-3 text-white rounded">

            <div class="col-span-2">
                <label class="block text-xs text-[#ffd700] mb-2 uppercase">FULL NAME</label>
                <input type="text" name="name" class="input-field w-full p-3 text-white rounded" required>
            </div>
            <div>
                <label class="block text-xs text-[#ffd700] mb-2 uppercase">CONTACT NUMBER</label>
                <input type="text" name="contact"  class="input-field w-full p-3 text-white rounded" required>
            </div>
            <div>
                <label class="block text-xs text-[#ffd700] mb-2 uppercase">TICKET NUMBER</label>
                <input type="text" name="ticketNumber" class="input-field w-full p-3 text-white rounded" required>
            </div>
            <div class="col-span-2">
                <label class="block text-xs text-[#ffd700] mb-2 uppercase">ADDRESS</label>
                <input type="text" name="address" class="input-field w-full p-3 text-white rounded" required>
            </div>
            <div class="col-span-2">
                <label class="block text-xs text-[#ffd700] mb-2 uppercase">SOLICITOR</label>
                <input type="text" name="solicitor" class="input-field w-full p-3 text-white rounded" required>
            </div>
            <button type="submit" class="col-span-2 cta-btn w-full p-4 rounded mt-4">INITIALIZE ENROLLMENT</button>
        </form>
    </div>

</body>
</html>
